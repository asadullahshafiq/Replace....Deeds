<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Replace Deeds - Premium</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

/* ===== THEMES ===== */
:root {
  --bg-primary: #0a0c10;
  --bg-secondary: #13161c;
  --bg-tertiary: #1a1f2a;
  --text-primary: #f0f3f8;
  --text-secondary: #8b95a5;
  --accent: #00d4b4;
  --accent-glow: rgba(0,212,180,0.3);
  --border: rgba(255,255,255,0.08);
  --danger: #f85149;
  --success: #3fb950;
  --warning: #d29922;
  --card-shadow: 0 8px 32px rgba(0,0,0,0.3);
  --glow: 0 0 20px rgba(0,212,180,0.2);
  --radius-lg: 24px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --font-serif: 'Playfair Display', serif;
  --font-sans: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

[data-theme="light"] {
  --bg-primary: #f5f7fa;
  --bg-secondary: #ffffff;
  --bg-tertiary: #eef2f6;
  --text-primary: #1a1a2e;
  --text-secondary: #4a5568;
  --border: rgba(0,0,0,0.08);
  --card-shadow: 0 8px 32px rgba(0,0,0,0.08);
}

[data-theme="forest"] {
  --bg-primary: #0a1f0a;
  --bg-secondary: #0f2a0f;
  --bg-tertiary: #153515;
  --text-primary: #e8f0e8;
  --text-secondary: #a8c8a8;
  --accent: #4ade80;
  --accent-glow: rgba(74,222,128,0.3);
}

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  transition: all 0.3s ease;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-tertiary); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

/* ===== UTILITY CLASSES ===== */
.hidden { display: none !important; }
.glass {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
}
.btn {
  padding: 12px 24px;
  border: none;
  border-radius: 100px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  font-family: var(--font-sans);
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent));
  color: #000;
  box-shadow: 0 4px 15px var(--accent-glow);
}
.btn-primary:hover { transform: translateY(-2px); filter: brightness(1.05); }
.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--accent); color: #000; transform: translateY(-2px); }
.btn-danger {
  background: transparent;
  color: var(--danger);
  border: 1px solid var(--danger);
}
.btn-danger:hover { background: var(--danger); color: #fff; }

/* ===== SPLASH ===== */
.splash {
  position: fixed;
  inset: 0;
  background: var(--bg-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  transition: opacity 0.6s ease;
}
.splash.fade-out { opacity: 0; pointer-events: none; }
.splash-logo { text-align: center; animation: splashPulse 1s ease; }
@keyframes splashPulse {
  0% { transform: scale(0.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.splash-title {
  font-family: var(--font-serif);
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ===== ONBOARDING ===== */
.onboard-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.onboard-step {
  display: none;
  text-align: center;
  max-width: 400px;
  width: 100%;
  animation: fadeUp 0.5s ease;
}
.onboard-step.active { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.input-field {
  width: 100%;
  padding: 14px 18px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 16px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 1rem;
  outline: none;
  transition: all 0.3s;
}
.input-field:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* ===== TOP BAR ===== */
.topbar {
  position: sticky;
  top: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}
.xp-card {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-tertiary);
  padding: 8px 16px;
  border-radius: 100px;
  cursor: pointer;
}
.xp-value {
  font-family: var(--font-mono);
  font-weight: 700;
  color: var(--accent);
}
.level-badge {
  background: var(--accent-glow);
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 600;
}
.avatar {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--accent));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  cursor: pointer;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 8px 16px;
  max-width: 600px;
  margin: 0 auto;
  z-index: 100;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  padding: 8px;
  border-radius: 12px;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.3s;
}
.nav-item.active { color: var(--accent); background: var(--accent-glow); }
.nav-icon { font-size: 1.4rem; }
.nav-label { font-size: 0.65rem; font-weight: 500; }

/* ===== MAIN CONTENT ===== */
.main-content {
  max-width: 600px;
  margin: 0 auto;
  padding-bottom: 80px;
}
.tab-panel {
  display: none;
  padding: 16px;
  animation: fadeUp 0.3s ease;
}
.tab-panel.active { display: block; }

/* ===== XP CARD ===== */
.xp-progress-card {
  background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
  border-radius: var(--radius-lg);
  padding: 24px;
  text-align: center;
  margin-bottom: 20px;
  box-shadow: var(--card-shadow);
}
.rank-icon { font-size: 3rem; margin-bottom: 8px; }
.rank-name { font-family: var(--font-serif); font-size: 1.3rem; margin-bottom: 12px; }
.progress-container {
  background: var(--bg-primary);
  border-radius: 100px;
  height: 8px;
  overflow: hidden;
  margin: 12px 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent));
  border-radius: 100px;
  transition: width 0.5s ease;
}

/* ===== SECTION CARDS ===== */
.section-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  margin-bottom: 16px;
  overflow: hidden;
  transition: all 0.3s;
}
.section-card:hover { transform: translateY(-2px); box-shadow: var(--card-shadow); }
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
  cursor: pointer;
}
.section-title {
  font-family: var(--font-serif);
  font-size: 1.1rem;
  font-weight: 700;
}
.section-progress {
  height: 4px;
  background: var(--bg-tertiary);
  border-radius: 100px;
  margin-top: 8px;
}
.section-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 100px;
}
.habits-list { padding: 0 16px 16px; }
.habit-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.habit-check {
  width: 32px;
  height: 32px;
  border: 2px solid var(--border);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
.habit-check.completed {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}
.habit-info { flex: 1; }
.habit-name { font-weight: 500; }
.habit-desc { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }

/* ===== PRAYERS SECTION ===== */
.prayer-tree {
  background: var(--bg-secondary);
  border-radius: var(--radius-lg);
  padding: 20px;
  text-align: center;
  margin-bottom: 20px;
}
.tree-icon { font-size: 4rem; margin-bottom: 10px; transition: transform 0.3s; }
.streak-stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 16px 0;
}
.stat-badge {
  background: var(--bg-tertiary);
  padding: 8px 16px;
  border-radius: 100px;
}
.prayer-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 10px;
}
.prayer-name { font-weight: 700; min-width: 70px; }
.prayer-time {
  background: var(--bg-tertiary);
  border: none;
  padding: 6px 12px;
  border-radius: 100px;
  color: var(--text-primary);
  font-family: var(--font-mono);
}
.prayer-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
.prayer-tick {
  padding: 6px 12px;
  border-radius: 100px;
  background: var(--bg-tertiary);
  border: none;
  cursor: pointer;
  font-size: 0.7rem;
  transition: all 0.3s;
}
.prayer-tick.active { background: var(--success); color: #000; }
.freeze-token {
  background: linear-gradient(135deg, var(--accent), var(--accent));
  color: #000;
  padding: 8px 20px;
  border-radius: 100px;
  display: inline-block;
  margin-top: 12px;
  cursor: pointer;
  font-weight: 600;
}

/* ===== TASKS ===== */
.task-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px;
  margin-bottom: 10px;
}
.task-check {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.task-check.completed { background: var(--success); border-color: var(--success); }
.alarm-badge {
  background: var(--warning);
  color: #000;
  padding: 2px 8px;
  border-radius: 100px;
  font-size: 0.7rem;
  margin-left: 8px;
}

/* ===== TIME TABLE ===== */
.timetable-grid {
  background: var(--bg-secondary);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.timetable-row {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.timetable-time {
  width: 90px;
  padding: 12px;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  background: var(--bg-tertiary);
  border-right: 1px solid var(--border);
}
.timetable-item {
  flex: 1;
  padding: 12px;
  cursor: pointer;
}
.timetable-item:hover { background: var(--accent-glow); }

/* ===== HISTORY ===== */
.history-list {
  max-height: 400px;
  overflow-y: auto;
}
.history-item {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-bottom: 8px;
}
.history-date { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 4px; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(20px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal {
  background: var(--bg-secondary);
  border-radius: var(--radius-lg);
  padding: 24px;
  width: 100%;
  max-width: 400px;
  max-height: 85vh;
  overflow-y: auto;
}

/* ===== DRAFT INDICATOR ===== */
.draft-toast {
  position: fixed;
  bottom: 100px;
  right: 20px;
  background: var(--accent);
  color: #000;
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 0.7rem;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 200;
}
.draft-toast.show { opacity: 1; }

/* ===== LEVEL UP ANIMATION ===== */
.levelup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 5000;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeOut 2s forwards;
}
@keyframes fadeOut {
  0% { opacity: 1; }
  70% { opacity: 1; }
  100% { opacity: 0; visibility: hidden; }
}
.levelup-content { text-align: center; animation: bounceIn 0.5s ease; }
@keyframes bounceIn {
  0% { transform: scale(0.5); opacity: 0; }
  80% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

@media (min-width: 600px) {
  .bottom-nav { left: 50%; transform: translateX(-50%); }
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="splash">
  <div class="splash-logo">
    <h1 class="splash-title">Replace Deeds</h1>
    <p style="color:var(--text-secondary); margin-top:12px">Track. Pray. Grow.</p>
  </div>
</div>

<!-- ONBOARDING -->
<div id="onboarding" class="hidden">
  <div class="onboard-container">
    <div class="onboard-step active" data-step="0">
      <div style="font-size:4rem; margin-bottom:16px">🌱</div>
      <h2 style="font-family:var(--font-serif); margin-bottom:12px">Welcome to Replace Deeds</h2>
      <p style="color:var(--text-secondary); margin-bottom:24px">Track habits, prayers, earn XP, and grow spiritually</p>
      <button class="btn btn-primary" onclick="nextOnboard()">Begin Journey</button>
    </div>
    <div class="onboard-step" data-step="1">
      <div style="font-size:4rem; margin-bottom:16px">👤</div>
      <h2 style="margin-bottom:20px">Create Your Profile</h2>
      <div style="margin-bottom:16px"><input type="text" id="pName" class="input-field" placeholder="Your Name"></div>
      <div style="margin-bottom:16px"><input type="text" id="pUsername" class="input-field" placeholder="Username"></div>
      <div style="margin-bottom:24px"><input type="password" id="pPin" class="input-field" maxlength="4" placeholder="PIN (4 digits)"></div>
      <button class="btn btn-primary" onclick="saveProfile()">Create Profile</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
  <header class="topbar">
    <div class="xp-card" onclick="showXPDetails()">
      <span>⭐</span>
      <span class="xp-value" id="xpValue">0</span>
    </div>
    <div class="level-badge" id="levelBadge">🌱 Seed</div>
    <div class="avatar" id="avatarBtn" onclick="showTab('settings')">U</div>
  </header>

  <main class="main-content">
    <!-- HABITS TAB -->
    <div class="tab-panel active" id="tab-habits">
      <div id="sectionsContainer"></div>
      <button class="btn btn-secondary" style="width:100%; margin-top:12px" onclick="showAddSection()">+ Add Section</button>
    </div>

    <!-- PRAYERS TAB -->
    <div class="tab-panel" id="tab-prayers">
      <div id="prayersContainer"></div>
    </div>

    <!-- TASKS TAB -->
    <div class="tab-panel" id="tab-tasks">
      <div style="display:flex; justify-content:space-between; margin-bottom:16px">
        <h2 style="font-family:var(--font-serif)">✅ Tasks</h2>
        <button class="btn btn-secondary" style="padding:8px 20px" onclick="showAddTask()">+ Add</button>
      </div>
      <div id="tasksList"></div>
    </div>

    <!-- TIME TABLE TAB -->
    <div class="tab-panel" id="tab-timetable">
      <div style="display:flex; justify-content:space-between; margin-bottom:16px">
        <h2 style="font-family:var(--font-serif)">📅 Time Table</h2>
        <button class="btn btn-secondary" style="padding:8px 20px" onclick="showAddTimetable()">+ Add</button>
      </div>
      <div id="timetableContainer"></div>
    </div>

    <!-- STATS TAB -->
    <div class="tab-panel" id="tab-stats">
      <div class="xp-progress-card">
        <div class="rank-icon" id="rankIcon">🌱</div>
        <div class="rank-name" id="rankName">Seed</div>
        <div><span id="currentXP">0</span> / <span id="nextXP">100</span> XP</div>
        <div class="progress-container"><div class="progress-fill" id="xpProgressFill" style="width:0%"></div></div>
      </div>
      <div id="statsGrid"></div>
      <h3 style="margin: 20px 0 12px">📜 Activity History</h3>
      <div id="historyList" class="history-list"></div>
    </div>

    <!-- SETTINGS TAB -->
    <div class="tab-panel" id="tab-settings">
      <div style="background:var(--bg-secondary); border-radius:24px; padding:20px; margin-bottom:16px">
        <h3 style="margin-bottom:16px">🎨 Themes</h3>
        <div style="display:flex; gap:12px; flex-wrap:wrap">
          <button class="btn btn-secondary" onclick="setTheme('dark')">🌙 Dark</button>
          <button class="btn btn-secondary" onclick="setTheme('light')">☀️ Light</button>
          <button class="btn btn-secondary" onclick="setTheme('forest')">🌿 Forest</button>
        </div>
      </div>
      <div style="background:var(--bg-secondary); border-radius:24px; padding:20px; margin-bottom:16px">
        <h3 style="margin-bottom:16px">👤 Profile</h3>
        <div id="profileCard"></div>
      </div>
      <div style="background:var(--bg-secondary); border-radius:24px; padding:20px; margin-bottom:16px">
        <h3 style="margin-bottom:16px">💾 Data</h3>
        <button class="btn btn-danger" onclick="exportData()">📤 Export Data</button>
        <button class="btn btn-danger" onclick="confirmReset()" style="margin-left:12px">🗑️ Reset App</button>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showTab('habits')" data-tab="habits"><span class="nav-icon">🏠</span><span class="nav-label">Habits</span></button>
    <button class="nav-item" onclick="showTab('prayers')" data-tab="prayers"><span class="nav-icon">🕌</span><span class="nav-label">Prayers</span></button>
    <button class="nav-item" onclick="showTab('tasks')" data-tab="tasks"><span class="nav-icon">✅</span><span class="nav-label">Tasks</span></button>
    <button class="nav-item" onclick="showTab('timetable')" data-tab="timetable"><span class="nav-icon">📅</span><span class="nav-label">Time</span></button>
    <button class="nav-item" onclick="showTab('stats')" data-tab="stats"><span class="nav-icon">📊</span><span class="nav-label">Stats</span></button>
    <button class="nav-item" onclick="showTab('settings')" data-tab="settings"><span class="nav-icon">⚙️</span><span class="nav-label">Settings</span></button>
  </nav>
</div>

<div id="modalOverlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div id="modalContent"></div></div>
</div>
<div id="draftToast" class="draft-toast">💾 Draft saved</div>

<script>
// ===== STORAGE =====
const Store = {
  _prefix: 'rd_premium_',
  set(k, v) { localStorage.setItem(this._prefix + k, JSON.stringify(v)); },
  get(k, d = null) { try { return JSON.parse(localStorage.getItem(this._prefix + k)) || d; } catch { return d; } },
  del(k) { localStorage.removeItem(this._prefix + k); },
  clear() { Object.keys(localStorage).filter(k => k.startsWith(this._prefix)).forEach(k => localStorage.removeItem(k)); }
};

// ===== ALARM SYSTEM =====
let alarmTimeouts = {};

function scheduleAlarm(id, time, title, repeatDaily) {
  if (alarmTimeouts[id]) clearTimeout(alarmTimeouts[id]);
  let [h, m] = time.split(':');
  let now = new Date();
  let alarmTime = new Date();
  alarmTime.setHours(parseInt(h), parseInt(m), 0, 0);
  if (alarmTime <= now) alarmTime.setDate(alarmTime.getDate() + 1);
  let delay = alarmTime - now;
  if (delay > 0) {
    alarmTimeouts[id] = setTimeout(() => {
      if (Notification.permission === "granted") {
        new Notification("🔔 Reminder", { body: title, icon: "/icon-192.svg", requireInteraction: true });
      }
      playBeep();
      if (repeatDaily) scheduleAlarm(id, time, title, repeatDaily);
    }, delay);
  }
}

function playBeep() {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.value = 0.3;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5);
    osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}

  if (alarmTimeouts[id]) { clearTimeout(alarmTimeouts[id]); delete alarmTimeouts[id]; }

const RANKS = [
  { min: 0, name: "Seed", icon: "🌱", next: 100 },
  { min: 100, name: "Sprout", icon: "🌿", next: 300 },
  { min: 300, name: "Sapling", icon: "🪴", next: 600 },
  { min: 600, name: "Growing", icon: "🌳", next: 1000 },
  { min: 1000, name: "Bronze", icon: "🥉", next: 1500 },
  { min: 1500, name: "Silver", icon: "🥈", next: 2200 },
  { min: 2200, name: "Gold", icon: "🥇", next: 3200 },
  { min: 3200, name: "Platinum", icon: "💎", next: 4500 },
  { min: 4500, name: "Diamond", icon: "👑", next: 6000 },
  { min: 6000, name: "Legend", icon: "🔥", next: Infinity }
];

function getRank(xp) { for (let i = RANKS.length-1; i>=0; i--) if (xp >= RANKS[i].min) return RANKS[i]; return RANKS[0]; }

function addXP(amt, reason) {
  let xp = Store.get('xp', 0);
  let oldRank = getRank(xp);
  xp += amt;
  Store.set('xp', xp);
  updateXPDisplay();
  addHistory(`${amt > 0 ? '+' : ''}${amt} XP`, reason);
  let newRank = getRank(xp);
  if (oldRank.name !== newRank.name) showLevelUp(newRank);
}

function updateXPDisplay() {
  let xp = Store.get('xp', 0);
  let r = getRank(xp);
  let next = RANKS[RANKS.findIndex(rr => rr.name === r.name) + 1] || r;
  let percent = ((xp - r.min) / (next.next - r.min)) * 100;
  document.getElementById('xpValue') && (document.getElementById('xpValue').innerText = xp);
  document.getElementById('levelBadge') && (document.getElementById('levelBadge').innerText = `${r.icon} ${r.name}`);
  document.getElementById('rankIcon') && (document.getElementById('rankIcon').innerText = r.icon);
  document.getElementById('rankName') && (document.getElementById('rankName').innerText = r.name);
  document.getElementById('currentXP') && (document.getElementById('currentXP').innerText = xp);
  document.getElementById('nextXP') && (document.getElementById('nextXP').innerText = next.next === Infinity ? "MAX" : next.next);
  document.getElementById('xpProgressFill') && (document.getElementById('xpProgressFill').style.width = Math.min(100, percent) + '%');
}

function showLevelUp(r) {
  let div = document.createElement('div');
  div.className = 'levelup-overlay';
  div.innerHTML = `<div class="levelup-content"><div style="font-size:5rem">${r.icon}</div><div style="font-size:2rem;color:var(--accent)">LEVEL UP!</div><div>${r.name} Rank Unlocked!</div></div>`;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2000);
}

function renderPrayers() {

  let comps = getPrayerCompletions();
  let todayStr = today();

  let treeStage = settings.treeStage || 0;
  let treeIcon = treeStage < 10 ? '🌱' : treeStage < 30 ? '🌿' : treeStage < 60 ? '🌳' : '🌲';
  let appleIcon = treeStage >= 120 ? '🍎✨' : treeStage >= 80 ? '🍎💙' : treeStage >= 40 ? '🍎❤️' : '';
  
  cont.innerHTML = `<div class="prayer-tree"><div class="tree-icon" id="treeAnim">${treeIcon}${appleIcon}</div><div class="streak-stats"><div class="stat-badge">🔥 ${settings.streak} days</div><div class="stat-badge">🏆 ${settings.longestStreak}</div></div><div>🌳 ${treeStage} days of Ibadah</div>${settings.freezeTokens > 0 ? `<div class="freeze-token" onclick="useFreezeToken()">❄️ Freeze Token (${settings.freezeTokens})</div>` : ''}</div><h3>🕌 Daily Prayers</h3>${PRAYERS.map(p => `<div class="prayer-item"><span class="prayer-name">${p}</span><input type="time" class="prayer-time" value="${settings.times[p] || DEFAULT_TIMES[p]}" onchange="updatePrayerTime('${p}', this.value)"><div class="prayer-buttons"><button class="prayer-tick ${todayComp[p] === 'prayed' ? 'active' : ''}" onclick="togglePrayer('${p}', 'prayed')">🕌 Prayed</button><button class="prayer-tick ${todayComp[p] === 'full' ? 'active' : ''}" onclick="togglePrayer('${p}', 'full')">🕌 Full</button><button class="prayer-tick ${todayComp[p] === 'jamaat' ? 'active' : ''}" onclick="togglePrayer('${p}', 'jamaat')">🕌 Jamaat</button></div></div>`).join('')}`;
}

function updatePrayerTime(prayer, time) {
  let settings = getPrayerSettings();
  settings.times[prayer] = time;
  setPrayerSettings(settings);
  scheduleAlarm(`prayer_${prayer}`, time, `${prayer} Prayer`, true);
  addHistory(`Prayer time set`, `${prayer}: ${time}`);
}

function togglePrayer(prayer, type) {
  let comps = getPrayerCompletions();
  let todayStr = today();
  if (!comps[todayStr]) comps[todayStr] = {};
  if (comps[todayStr][prayer] === type) delete comps[todayStr][prayer];
  else comps[todayStr][prayer] = type;
  setPrayerCompletions(comps);
  updatePrayerStreak();
  renderPrayers();
  addXP(5, `Prayer: ${prayer}`);
  let tree = document.getElementById('treeAnim');
  if (tree) { tree.style.transform = 'scale(1.2)'; setTimeout(() => tree.style.transform = 'scale(1)', 300); }
}

function updatePrayerStreak() {
  let comps = getPrayerCompletions();
  let settings = getPrayerSettings();
  let todayStr = today();
  let allDone = PRAYERS.every(p => comps[todayStr] && comps[todayStr][p]);
  let yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1); let yesterdayStr = yesterday.toISOString().split('T')[0];
  if (allDone) {
    if (!settings.lastDate) settings.streak = 1;
    else if (settings.lastDate === yesterdayStr) settings.streak++;
    else settings.streak = 1;
    settings.lastDate = todayStr;
    settings.treeStage = (settings.treeStage || 0) + 1;
    if (settings.streak > settings.longestStreak) settings.longestStreak = settings.streak;
    if (settings.treeStage % 40 === 0 && settings.treeStage > 0) { settings.freezeTokens = (settings.freezeTokens || 0) + 1; addHistory(`Freeze token earned!`, `40-day streak!`); }
  } else if (settings.lastDate === yesterdayStr && !allDone) {
    if (settings.freezeTokens > 0) { settings.freezeTokens--; addHistory(`Freeze token used`, `Streak saved`); }
    else { settings.streak = 0; settings.treeStage = 0; addHistory(`Streak broken`, `Missed a prayer`); }
  }
  setPrayerSettings(settings);
}

function useFreezeToken() {
  let settings = getPrayerSettings();
  if (settings.freezeTokens > 0) { settings.freezeTokens--; setPrayerSettings(settings); renderPrayers(); addHistory(`Freeze token used`, `Prayer streak saved`); showNotification("❄️ Freeze token used! Streak saved!", "success"); }
}

function saveProfile() {
  let name = document.getElementById('pName')?.value.trim();
  let user = document.getElementById('pUsername')?.value.trim();
  let pin = document.getElementById('pPin')?.value;
  if (!name || !user || pin?.length !== 4) { alert("Fill all fields correctly"); return; }
  setProfile({ name, username: user, pin, createdAt: new Date().toISOString() });
  document.getElementById('avatarBtn').innerText = name.charAt(0).toUpperCase();
  document.getElementById('onboarding').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  addHistory(`Profile created`, name);
  initApp();
}
function initApp() {
  renderSections(); renderPrayers(); renderTasks(); renderTimetable(); updateXPDisplay(); updateStats(); renderHistory(); applySavedTheme();
  let p = getProfile();
  if (p && document.getElementById('profileCard')) document.getElementById('profileCard').innerHTML = `<div><strong>Name:</strong> ${esc(p.name)}</div><div><strong>Username:</strong> @${esc(p.username)}</div><div><strong>Member:</strong> ${new Date(p.createdAt).toLocaleDateString()}</div><div><strong>Total XP:</strong> ${Store.get('xp',0)}</div>`;
}
function showTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tab}`)?.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.querySelector(`.nav-item[data-tab="${tab}"]`)?.classList.add('active');
  if (tab === 'prayers') renderPrayers();
  if (tab === 'timetable') renderTimetable();
  if (tab === 'tasks') renderTasks();
  if (tab === 'stats') { updateStats(); renderHistory(); }
}
function showNotification(msg, type) {
  let d = document.createElement('div');
  d.style.cssText = `position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:12px 24px;border-radius:100px;z-index:5000;font-weight:600`;
  d.innerText = msg;
  document.body.appendChild(d);
  setTimeout(() => { d.style.opacity='0'; setTimeout(()=>d.remove(),500); }, 3000);
}
function showXPDetails() {
  let xp = Store.get('xp',0);
  let r = getRank(xp);
  let next = RANKS[RANKS.findIndex(rr=>rr.name===r.name)+1] || r;
  showModal(`<h3>⭐ Your Progress</h3><div style="text-align:center;font-size:3rem">${r.icon}</div><div style="text-align:center;font-size:1.5rem">${r.name}</div><div>${xp} XP</div><div class="progress-container"><div class="progress-fill" style="width:${((xp-r.min)/(next.next-r.min))*100}%"></div></div>`);
}
function exportData() {
  let data = { xp: Store.get('xp',0), sections: getSections(), habits: getHabits(), completions: getCompletions(), tasks: getTasks(), taskCompletions: getTaskCompletions(), timetable: getTimetable(), profile: getProfile(), history: Store.get('history',[]), prayerSettings: getPrayerSettings(), prayerCompletions: getPrayerCompletions() };
  let blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup-${today()}.json`; a.click(); URL.revokeObjectURL(a.href);
  addHistory(`Exported data`, `Backup created`);
}
function confirmReset() { if (confirm("⚠️ Delete ALL data? Cannot undo!")) { Store.clear(); location.reload(); } }
function showModal(c) { document.getElementById('modalContent').innerHTML = c; document.getElementById('modalOverlay').classList.remove('hidden'); }
function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
window.nextOnboard = function() { let steps = document.querySelectorAll('.onboard-step'); let cur = -1; steps.forEach((s,i)=> { if(s.classList.contains('active')) cur=i; }); if(cur+1 < steps.length) { steps[cur].classList.remove('active'); steps[cur+1].classList.add('active'); } };
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    let splash = document.getElementById('splash');
    splash.classList.add('fade-out');
    setTimeout(() => { splash.style.display = 'none'; if (!getProfile()) document.getElementById('onboarding').classList.remove('hidden'); else { document.getElementById('app').classList.remove('hidden'); initApp(); } }, 800);
  }, 1500);
  if (Notification.permission !== "granted" && Notification.permission !== "denied") Notification.requestPermission();
});
</script>
