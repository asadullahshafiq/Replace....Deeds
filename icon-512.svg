<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="premiumDarkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050c12;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="growthGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4b4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe082;stop-opacity:1" /> </linearGradient>

    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="sparkleShader" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
        <stop offset="100%" stop-color="#ffe082" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#premiumDarkBg)" stroke="#1a2332" stroke-width="2"/>

  <circle cx="256" cy="256" r="192" fill="none" stroke="#26a69a" stroke-width="5" stroke-dasharray="10,20" opacity="0.2"/>

  <path d="M256 80 A176 176 0 1 1 80 256" fill="none" stroke="url(#growthGradient)" stroke-width="18" stroke-linecap="round"/>

  <path d="M256,55 C265,55 272,65 272,75 C272,85 265,95 256,95 C247,95 240,85 240,75 C240,65 247,55 256,55 Z M256,40 L262,60 L250,60 Z" fill="#ffe082" style="filter: drop-shadow(0px 0px 10px rgba(255,224,130,0.9));" />
  
  <polyline points="155,268 222,335 360,195" fill="none" stroke="#00e676" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" filter="url(#strongGlow)"/>

  <circle cx="410" cy="130" r="10" fill="url(#sparkleShader)" opacity="0.8" />
  <circle cx="435" cy="105" r="6" fill="url(#sparkleShader)" opacity="0.6" />
</svg>
